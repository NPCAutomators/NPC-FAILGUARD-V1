name: Windows install test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  windows-install:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run installer (skip Claude Code in CI)
        # PSModulePath is cleared because the runner's pwsh pollutes it for
        # Windows PowerShell 5.1; echo. feeds the "Press Enter" prompt.
        run: cmd /c "set PSModulePath=&& echo. | powershell -NoProfile -ExecutionPolicy Bypass -File install.ps1 -NoClaude"

      - name: Start daemon + exercise proxy (one step - CI kills bg procs between steps)
        run: |
          $py = Join-Path $PWD "core\.venv\Scripts\python.exe"
          $proc = Start-Process -FilePath $py `
            -ArgumentList (Join-Path $PWD "core\main.py") -WorkingDirectory $PWD `
            -RedirectStandardOutput daemon.out -RedirectStandardError daemon.err -PassThru
          try {
            $ok = $false
            foreach ($i in 1..30) {
              try { Invoke-RestMethod http://127.0.0.1:8787/ -TimeoutSec 2 | Out-Null; $ok = $true; break }
              catch { Start-Sleep 2 }
            }
            if (-not $ok) {
              Write-Host "--- daemon.err ---"; Get-Content daemon.err -ErrorAction SilentlyContinue
              Write-Host "--- daemon.out ---"; Get-Content daemon.out -ErrorAction SilentlyContinue
              throw "proxy never answered on 8787"
            }
            Write-Host "proxy is up (pid $($proc.Id))"

            Write-Host "`n=== status (fresh install, 0 keys) ==="
            Invoke-RestMethod http://127.0.0.1:8787/_npc-failguard/status | ConvertTo-Json -Depth 5

            Write-Host "`n=== add dummy key + verify hot reload ==="
            & $py core\manage.py add-key sk-ci-dummy-0123456789abcdef
            & $py core\manage.py status
            $s = Invoke-RestMethod http://127.0.0.1:8787/_npc-failguard/status
            if (@($s.keys).Count -lt 1) { throw "key did not appear after reload" }

            Write-Host "`n=== statusline renders (Windows PowerShell 5.1) ==="
            '{"model":{"display_name":"CI"}}' | Set-Content -NoNewline "$env:TEMP\sl-in.json"
            $out = cmd /c "set PSModulePath=&& powershell -NoProfile -ExecutionPolicy Bypass -File scripts\statusline.ps1 < %TEMP%\sl-in.json"
            Write-Host "statusline: $out"
            if (-not $out) { throw "statusline printed nothing" }
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Claude settings merge (claude-merge.py)
        run: |
          & core\.venv\Scripts\python.exe scripts\claude-merge.py `
            --settings "$env:TEMP\ci-settings.json" `
            --claude-json "$env:TEMP\ci-claude.json" `
            --statusline-cmd "powershell -File scripts\statusline.ps1" `
            --plugin-dir "$PWD"
          Get-Content "$env:TEMP\ci-settings.json"

      - name: Run test suite on Windows
        run: |
          & core\.venv\Scripts\python.exe -m pip install --quiet -r core\requirements-dev.txt
          & core\.venv\Scripts\python.exe -m pytest tests/ -q

      - name: Uninstall cleanly
        run: cmd /c "set PSModulePath=&& echo. | powershell -NoProfile -ExecutionPolicy Bypass -File uninstall.ps1 -Yes"

      - name: Diagnostics on failure
        if: failure()
        run: |
          Write-Host "--- scheduled task info ---"
          Get-ScheduledTaskInfo -TaskName "NPC FailGuard" -ErrorAction SilentlyContinue | Format-List
          Write-Host "--- proxy.log ---"
          Get-Content core\logs\proxy.log -Tail 50 -ErrorAction SilentlyContinue
          Write-Host "--- daemon stderr/stdout ---"
          Get-Content daemon.err -ErrorAction SilentlyContinue
          Get-Content daemon.out -ErrorAction SilentlyContinue
